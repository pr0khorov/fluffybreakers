<header class="header">
  <div class="header__container">
    <a routerLink="/" class="header__logo" (click)="closeMenu()">Fluffy<span>Breakers</span></a>

    <!-- Desktop nav -->
    <nav class="header__nav-desktop">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">{{ i18n.t('nav.home') }}</a>
      <a routerLink="/certificates" routerLinkActive="active">{{ i18n.t('nav.certificates') }}</a>
      <a routerLink="/guides" routerLinkActive="active">{{ i18n.t('nav.guides') }}</a>
      <a routerLink="/contacts" routerLinkActive="active">{{ i18n.t('nav.contacts') }}</a>
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="theme.isDark ? 'Switch to light mode' : 'Switch to dark mode'">{{ theme.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19' }}</button>
      <button class="lang-toggle" (click)="toggleLangMenu()">{{ i18n.langLabel }}</button>
      <div class="lang-dropdown" *ngIf="langMenuOpen">
        <button
          *ngFor="let lang of i18n.supportedLangs"
          [class.lang-dropdown__item--active]="lang === i18n.lang"
          class="lang-dropdown__item"
          (click)="selectLang(lang)"
        >{{ lang.toUpperCase() }}</button>
      </div>
    </nav>

    <!-- Burger button (mobile only) -->
    <button
      class="header__burger"
      [class.header__burger--open]="menuOpen"
      (click)="toggleMenu()"
      aria-label="Menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<!-- Mobile slide-out nav -->
<nav class="mobile-nav" [class.mobile-nav--open]="menuOpen">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">{{ i18n.t('nav.home') }}</a>
  <a routerLink="/certificates" routerLinkActive="active" (click)="closeMenu()">{{ i18n.t('nav.certificates') }}</a>
  <a routerLink="/guides" routerLinkActive="active" (click)="closeMenu()">{{ i18n.t('nav.guides') }}</a>
  <a routerLink="/contacts" routerLinkActive="active" (click)="closeMenu()">{{ i18n.t('nav.contacts') }}</a>
  <button class="theme-toggle" (click)="toggleTheme()">{{ theme.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19' }}</button>
  <button class="lang-toggle" (click)="toggleMobileLangMenu()">{{ i18n.langLabel }}</button>
  <div class="lang-dropdown lang-dropdown--mobile" *ngIf="mobileLangMenuOpen">
    <button
      *ngFor="let lang of i18n.supportedLangs"
      [class.lang-dropdown__item--active]="lang === i18n.lang"
      class="lang-dropdown__item"
      (click)="selectLang(lang); closeMenu()"
    >{{ lang.toUpperCase() }}</button>
  </div>
</nav>

<div
  class="overlay"
  *ngIf="menuOpen"
  (click)="closeMenu()"
></div>

<div
  class="lang-backdrop"
  *ngIf="langMenuOpen"
  (click)="closeLangMenu()"
></div>

<main class="main">
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <div class="footer__container">
    <p>{{ i18n.t('footer.rights') }}</p>
  </div>
</footer>

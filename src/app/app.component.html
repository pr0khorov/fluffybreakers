<header class="header">
  <div class="header__container">
    <a routerLink="/" class="header__logo" (click)="closeMenu()">FluffyBreakers</a>

    <!-- Desktop nav -->
    <nav class="header__nav-desktop">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Главная</a>
      <a routerLink="/certificates" routerLinkActive="active">Сертификаты</a>
      <a routerLink="/gallery" routerLinkActive="active">Галерея</a>
      <a routerLink="/contacts" routerLinkActive="active">Контакты</a>
    </nav>

    <!-- Burger button (mobile only) -->
    <button
      class="header__burger"
      [class.header__burger--open]="menuOpen"
      (click)="toggleMenu()"
      aria-label="Menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<!-- Mobile slide-out nav -->
<nav class="mobile-nav" [class.mobile-nav--open]="menuOpen">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Главная</a>
  <a routerLink="/certificates" routerLinkActive="active" (click)="closeMenu()">Сертификаты</a>
  <a routerLink="/gallery" routerLinkActive="active" (click)="closeMenu()">Галерея</a>
  <a routerLink="/contacts" routerLinkActive="active" (click)="closeMenu()">Контакты</a>
</nav>

<div
  class="overlay"
  *ngIf="menuOpen"
  (click)="closeMenu()"
></div>

<main class="main">
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <div class="footer__container">
    <p>&copy; 2026 FluffyBreakers. Все права защищены.</p>
  </div>
</footer>

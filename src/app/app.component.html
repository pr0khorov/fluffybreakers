<header class="header">
  <div class="header__container">
    <a routerLink="/" class="header__logo" (click)="closeMenu()">FluffyBreakers</a>

    <!-- Desktop nav -->
    <nav class="header__nav-desktop">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">{{ i18n.t('nav.home') }}</a>
      <a routerLink="/certificates" routerLinkActive="active">{{ i18n.t('nav.certificates') }}</a>
      <a routerLink="/guides" routerLinkActive="active">{{ i18n.t('nav.guides') }}</a>
      <a routerLink="/contacts" routerLinkActive="active">{{ i18n.t('nav.contacts') }}</a>
      <button class="lang-toggle" (click)="toggleLang()">{{ i18n.lang === 'en' ? 'RU' : 'EN' }}</button>
    </nav>

    <!-- Burger button (mobile only) -->
    <button
      class="header__burger"
      [class.header__burger--open]="menuOpen"
      (click)="toggleMenu()"
      aria-label="Menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<!-- Mobile slide-out nav -->
<nav class="mobile-nav" [class.mobile-nav--open]="menuOpen">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">{{ i18n.t('nav.home') }}</a>
  <a routerLink="/certificates" routerLinkActive="active" (click)="closeMenu()">{{ i18n.t('nav.certificates') }}</a>
  <a routerLink="/guides" routerLinkActive="active" (click)="closeMenu()">{{ i18n.t('nav.guides') }}</a>
  <a routerLink="/contacts" routerLinkActive="active" (click)="closeMenu()">{{ i18n.t('nav.contacts') }}</a>
  <button class="lang-toggle" (click)="toggleLang(); closeMenu()">{{ i18n.lang === 'en' ? 'RU' : 'EN' }}</button>
</nav>

<div
  class="overlay"
  *ngIf="menuOpen"
  (click)="closeMenu()"
></div>

<main class="main">
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <div class="footer__container">
    <p>{{ i18n.t('footer.rights') }}</p>
  </div>
</footer>

<section class="hero">
  <img class="hero__photo" src="assets/photos/main.png" alt="FluffyBreakers" />
  <div class="hero__text">
    <h1>Aleksandra</h1>
    <h2>Fluffy Breakers</h2>
    <p>Dog behavior specialist & Pet loss grief counselor
      <br>
      Riga, Latvia & Online
      <br>
      Helping through hard moments.
      <br>
      🧡bond🧡trust🧡comfort🧡safety🧡</p>
  </div>
</section>

<section class="faq">
  <div
    class="faq-item"
    [class.faq-item--open]="item.open"
    *ngFor="let item of faqItems"
  >
    <button class="faq-item__question" (click)="toggle(item)">
      <span>{{ item.question }}</span>
      <span class="faq-item__arrow">&#9662;</span>
    </button>
    <div class="faq-item__answer">
      <p [innerHTML]="item.answerHtml"></p>
    </div>
  </div>
</section>

<section class="certificates-page">
  <h1>Сертификаты</h1>
  <p class="subtitle">Наши достижения и подтверждения квалификации</p>

  <!-- Desktop / tablet viewer (top block) -->
  <div class="viewer viewer--desktop" *ngIf="selectedCert && selectedUrl">
    <div class="viewer__header">
      <button class="viewer__close" (click)="close()">Закрыть</button>
    </div>
    <div class="viewer__body">
      <iframe *ngIf="selectedCert.fileType === 'pdf'" [src]="selectedUrl" class="viewer__frame"></iframe>
      <img *ngIf="selectedCert.fileType === 'image'" [src]="selectedCert.file" class="viewer__image" />
    </div>
  </div>

  <!-- Certificate cards -->
  <div class="certificates-grid">
    <div
      class="certificate-card"
      [class.certificate-card--expanded]="cert.expanded"
      *ngFor="let cert of certificates"
      (click)="open(cert)"
    >
      <!-- Thumbnail -->
      <img
        *ngIf="cert.fileType === 'image'"
        [src]="cert.file"
        class="card__thumb"
        loading="lazy"
      />
      <div *ngIf="cert.fileType === 'pdf'" class="card__icon">&#128196;</div>

      <span class="card__action">{{ cert.expanded ? 'Скрыть' : 'Просмотреть' }}</span>

      <!-- Mobile inline viewer -->
      <div
        class="viewer viewer--inline"
        *ngIf="cert.expanded && cert.safeUrl"
        (click)="$event.stopPropagation()"
      >
        <iframe *ngIf="cert.fileType === 'pdf'" [src]="cert.safeUrl" class="viewer__frame"></iframe>
        <img *ngIf="cert.fileType === 'image'" [src]="cert.file" class="viewer__image" />
      </div>
    </div>
  </div>
</section>

<section class="contacts-page">
  <h1>{{ i18n.t('contacts.title') }}</h1>

  <div class="contacts-grid">
    <a
      class="contact-card"
      *ngFor="let item of contacts"
      [href]="item.link"
      target="_blank"
      rel="noopener noreferrer"
    >
      <div class="contact-icon">{{ item.icon }}</div>
      <h3>{{ item.labelKey ? i18n.t(item.labelKey) : item.label }}</h3>
      <p class="contact-value">{{ item.value }}</p>
    </a>
  </div>
</section>
